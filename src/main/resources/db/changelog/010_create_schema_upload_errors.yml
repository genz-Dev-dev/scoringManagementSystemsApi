databaseChangeLog:
    - changeSet:
          id: 010_create_upload_errors_table
          author: tola.dev001@gmail.com
          changes:
              - createTable:
                    tableName: tbl_uplaod_erorr
                    columns:
                        - column:
                              name: upload_error_id
                              type: uuid
                              defaultValueComputed: gen_random_uuid() # 🔥 auto-generate UUID
                              constraints:
                                  primaryKey: true
                                  nullable: false
                        - column:
                              name: upload_batch_id
                              type: uuid
                        - column:
                              name: row_name
                              type: integer
                              constraints:
                                  nullable: false
                        - column:
                              name: error_message
                              type: text
                              constraints:
                                  nullable: false
                        - column:
                              name: raw_data
                              type: jsonb
                        - column:
                              name: create_at
                              type: timestamp
              - addForeignKeyConstraint:
                    baseTableName: tbl_uplaod_erorr
                    baseColumnNames: upload_batch_id
                    referencedTableName: tbl_uplaod_batches
                    referencedColumnNames: upload_batch_id
                    constraintName: fk_upload_errors_batches
