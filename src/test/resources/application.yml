spring:
    datasource:
        url: jdbc:h2:mem:testdb
        driver-class-name: org.h2.Driver
        username: sa
        password:
    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: true
    h2:
        console:
            enabled: true

jwt:
    secret: test-secret-key
    expiration-ms: 86400000 # Changed from 'expiration' to 'expiration-ms'
    expiration-refresh: 604800000 # 7 day
